<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tripzy</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --sky:    #4facfe;
            --water:  #00f2fe;
            --night:  #0a0e1a;
            --road:   #1a1d2e;
            --white:  #ffffff;
            --glow:   rgba(79,172,254,0.6);
        }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: var(--night);
        }

        /* ═══════════════════════════
           SPLASH CONTAINER
        ═══════════════════════════ */
        #splash {
            position: fixed;
            inset: 0;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: var(--night);
        }

        /* ── Animated gradient sky background ── */
        .splash-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, #0d2b4e 0%, #0a0e1a 60%);
            z-index: 0;
        }

        /* ── Stars layer ── */
        .stars {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--dur, 2s) ease-in-out infinite var(--delay, 0s);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50%       { opacity: 1;   transform: scale(1.4); }
        }

        /* ── Road at the bottom ── */
        .road {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 38%;
            z-index: 2;
            overflow: hidden;
        }

        .road-surface {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 100%;
            background: linear-gradient(to top, #111318 0%, #1a1d2e 100%);
        }

        /* Road perspective lines */
        .road-surface::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 30vw solid transparent;
            border-right: 30vw solid transparent;
            border-bottom: 38vh solid #1e2235;
        }

        /* Dashed centre line */
        .road-dashes {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            width: 6px;
            height: 100%;
            overflow: hidden;
        }

        .dash {
            width: 4px;
            height: 28px;
            background: rgba(79,172,254,0.55);
            border-radius: 2px;
            flex-shrink: 0;
            margin-bottom: 18px;
            animation: dashMove 0.6s linear infinite;
        }

        @keyframes dashMove {
            0%   { transform: translateY(-46px); }
            100% { transform: translateY(0px); }
        }

        /* ── Glow horizon line ── */
        .horizon {
            position: absolute;
            bottom: 38%;
            left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg,
                transparent 0%,
                var(--glow) 30%,
                var(--sky) 50%,
                var(--glow) 70%,
                transparent 100%);
            z-index: 3;
            animation: horizonPulse 3s ease-in-out infinite;
        }

        @keyframes horizonPulse {
            0%, 100% { opacity: 0.6; filter: blur(1px); }
            50%       { opacity: 1;   filter: blur(0px); }
        }

        /* ── CAR ── */
        .car-wrapper {
            position: absolute;
            bottom: calc(38% - 4px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            animation: carArrive 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
        }

        @keyframes carArrive {
            0%   { transform: translateX(-50%) translateY(80px) scale(0.4); opacity: 0; }
            60%  { transform: translateX(-50%) translateY(-8px) scale(1.02); opacity: 1; }
            80%  { transform: translateX(-50%) translateY(3px) scale(0.99); }
            100% { transform: translateX(-50%) translateY(0px) scale(1); }
        }

        .car {
            width: 110px;
            filter: drop-shadow(0 0 18px rgba(79,172,254,0.8)) drop-shadow(0 4px 8px rgba(0,0,0,0.6));
            animation: carFloat 3s ease-in-out 1.5s infinite;
        }

        @keyframes carFloat {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-5px); }
        }

        /* Headlight beams */
        .headlights {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9;
            animation: carArrive 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
        }

        .beam {
            position: absolute;
            bottom: 12px;
            width: 0;
            height: 0;
            border-style: solid;
            opacity: 0.35;
        }

        .beam-left {
            right: calc(50% + 28px);
            border-width: 6px 0 6px 90px;
            border-color: transparent transparent transparent rgba(255,240,180,0.5);
            transform: rotate(-4deg);
            transform-origin: right center;
            filter: blur(3px);
        }

        .beam-right {
            left: calc(50% + 28px);
            border-width: 6px 90px 6px 0;
            border-color: transparent rgba(255,240,180,0.5) transparent transparent;
            transform: rotate(4deg);
            transform-origin: left center;
            filter: blur(3px);
        }

        /* ── Speed lines ── */
        .speed-lines {
            position: absolute;
            bottom: calc(38% + 10px);
            left: 0; right: 0;
            height: 60px;
            z-index: 6;
            overflow: hidden;
            opacity: 0;
            animation: speedFadeIn 0.4s ease 0.8s forwards;
        }

        @keyframes speedFadeIn {
            to { opacity: 1; }
        }

        .speed-line {
            position: absolute;
            height: 1.5px;
            background: linear-gradient(90deg, transparent, rgba(79,172,254,0.5), transparent);
            border-radius: 2px;
            animation: speedMove var(--spd, 0.5s) linear infinite var(--del, 0s);
        }

        @keyframes speedMove {
            0%   { transform: translateX(-60%); opacity: 0; }
            30%  { opacity: 1; }
            70%  { opacity: 1; }
            100% { transform: translateX(60%); opacity: 0; }
        }

        /* ═══════════════════════════
           LOGO + BRAND TEXT
        ═══════════════════════════ */
        .brand {
            position: relative;
            z-index: 20;
            text-align: center;
            margin-bottom: 8%;
            animation: brandReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.4s both;
        }

        @keyframes brandReveal {
            0%   { opacity: 0; transform: translateY(-24px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-img {
            width: 130px;
            filter: drop-shadow(0 0 24px rgba(79,172,254,0.9)) drop-shadow(0 0 8px rgba(0,242,254,0.6));
            animation: logoPulse 2.5s ease-in-out 2.2s infinite;
        }

        @keyframes logoPulse {
            0%, 100% { filter: drop-shadow(0 0 24px rgba(79,172,254,0.9)) drop-shadow(0 0 8px rgba(0,242,254,0.6)); }
            50%       { filter: drop-shadow(0 0 36px rgba(79,172,254,1))   drop-shadow(0 0 16px rgba(0,242,254,0.9)); }
        }

        .brand-name {
            font-family: 'Righteous', cursive;
            font-size: 52px;
            letter-spacing: 4px;
            line-height: 1;
            margin-top: 6px;
            background: linear-gradient(135deg, #ffffff 0%, var(--sky) 50%, var(--water) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            position: relative;
            overflow: hidden;
        }

        /* Letter-by-letter reveal */
        .brand-name span {
            display: inline-block;
            animation: letterPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .brand-name span:nth-child(1) { animation-delay: 1.5s; }
        .brand-name span:nth-child(2) { animation-delay: 1.62s; }
        .brand-name span:nth-child(3) { animation-delay: 1.74s; }
        .brand-name span:nth-child(4) { animation-delay: 1.86s; }
        .brand-name span:nth-child(5) { animation-delay: 1.98s; }
        .brand-name span:nth-child(6) { animation-delay: 2.1s; }

        @keyframes letterPop {
            0%   { opacity: 0; transform: translateY(30px) rotate(-8deg) scale(0.5); }
            70%  { transform: translateY(-4px) rotate(2deg) scale(1.1); }
            100% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
        }

        .tagline {
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            margin-top: 8px;
            animation: taglineReveal 0.6s ease 2.4s both;
        }

        @keyframes taglineReveal {
            0%   { opacity: 0; letter-spacing: 8px; }
            100% { opacity: 1; letter-spacing: 3px; }
        }

        /* ── Shimmer sweep across brand name ── */
        .shimmer {
            position: absolute;
            top: 0; left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg);
            animation: shimmerSweep 0.7s ease 2.6s forwards;
        }

        @keyframes shimmerSweep {
            0%   { left: -100%; }
            100% { left: 160%; }
        }

        /* ── Loading dots ── */
        .loading-dots {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 20;
            animation: dotsAppear 0.4s ease 2.2s both;
        }

        @keyframes dotsAppear {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--sky);
            animation: dotBounce 1.2s ease-in-out infinite;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.15s; background: var(--water); }
        .dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
            40%            { transform: scale(1.2); opacity: 1; }
        }

        /* ── Ripple rings ── */
        .rings {
            position: absolute;
            bottom: calc(38% - 6px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(79,172,254,0.4);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            animation: ringExpand 2s ease-out infinite;
        }

        .ring:nth-child(1) { animation-delay: 1.8s; }
        .ring:nth-child(2) { animation-delay: 2.3s; }
        .ring:nth-child(3) { animation-delay: 2.8s; }

        @keyframes ringExpand {
            0%   { width: 20px; height: 10px; opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
            100% { width: 300px; height: 60px; opacity: 0;  transform: translate(-50%, -50%) scale(1); }
        }

        /* ── Exit animation ── */
        #splash.exit {
            animation: splashExit 0.6s cubic-bezier(0.55, 0, 1, 0.45) forwards;
        }

        @keyframes splashExit {
            0%   { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.08); pointer-events: none; }
        }

        /* ── Main app (hidden until splash exits) ── */
        #app-root {
            opacity: 0;
            transition: opacity 0.5s ease 0.3s;
        }

        #app-root.visible {
            opacity: 1;
        }
    </style>
</head>
<body>

<!-- ════════════════════════════════
     SPLASH SCREEN
════════════════════════════════ -->
<div id="splash">
    <div class="splash-bg"></div>

    <!-- Stars -->
    <div class="stars" id="stars"></div>

    <!-- Brand / Logo -->
    <div class="brand">
        <img src="/static/logo1.png" class="logo-img" alt="Tripzy"
             onerror="this.style.display='none'; document.querySelector('.logo-emoji').style.display='block'">
        <div class="logo-emoji" style="display:none; font-size:64px; margin-bottom:8px">🚗</div>
        <div class="brand-name" style="position:relative">
            <span>T</span><span>r</span><span>i</span><span>p</span><span>z</span><span>y</span>
            <div class="shimmer"></div>
        </div>
        <div class="tagline">Your Journey Partner</div>
    </div>

    <!-- Road -->
    <div class="road">
        <div class="road-surface"></div>
        <div class="road-dashes" id="roadDashes"></div>
    </div>

    <!-- Horizon glow -->
    <div class="horizon"></div>

    <!-- Ripple rings from car -->
    <div class="rings">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
    </div>

    <!-- Headlight beams -->
    <div class="headlights">
        <div class="beam beam-left"></div>
        <div class="beam beam-right"></div>
    </div>

    <!-- Car SVG -->
    <div class="car-wrapper">
        <!-- Inline SVG car — no external dependency -->
        <svg class="car" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
            <!-- Body -->
            <defs>
                <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#4facfe"/>
                    <stop offset="100%" stop-color="#0077cc"/>
                </linearGradient>
                <linearGradient id="roofGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#00d4ff"/>
                    <stop offset="100%" stop-color="#4facfe"/>
                </linearGradient>
                <linearGradient id="windowGrad" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="rgba(200,240,255,0.9)"/>
                    <stop offset="100%" stop-color="rgba(100,200,255,0.5)"/>
                </linearGradient>
                <filter id="glow">
                    <feGaussianBlur stdDeviation="2" result="blur"/>
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
            </defs>

            <!-- Shadow -->
            <ellipse cx="100" cy="76" rx="72" ry="6" fill="rgba(0,0,0,0.4)"/>

            <!-- Car base body -->
            <rect x="18" y="38" width="164" height="30" rx="10" fill="url(#bodyGrad)" filter="url(#glow)"/>

            <!-- Roof / cabin -->
            <path d="M55 38 Q65 18 85 16 L118 16 Q138 16 148 38 Z" fill="url(#roofGrad)" filter="url(#glow)"/>

            <!-- Front windshield -->
            <path d="M120 38 Q136 22 148 38 Z" fill="url(#windowGrad)" opacity="0.85"/>

            <!-- Rear windshield -->
            <path d="M55 38 Q62 22 82 18 L86 18 Q70 22 62 38 Z" fill="url(#windowGrad)" opacity="0.85"/>

            <!-- Side window -->
            <path d="M86 18 L116 18 Q130 20 138 38 L68 38 Q72 22 86 18 Z" fill="url(#windowGrad)" opacity="0.75"/>

            <!-- Window highlight -->
            <path d="M90 20 L114 20 Q122 24 126 32 L86 32 Q86 24 90 20 Z" fill="rgba(255,255,255,0.15)" rx="3"/>

            <!-- Door line -->
            <line x1="100" y1="38" x2="100" y2="66" stroke="rgba(0,100,180,0.4)" stroke-width="1"/>

            <!-- Door handles -->
            <rect x="74"  y="50" width="12" height="3" rx="1.5" fill="rgba(255,255,255,0.4)"/>
            <rect x="112" y="50" width="12" height="3" rx="1.5" fill="rgba(255,255,255,0.4)"/>

            <!-- Headlights (front) -->
            <rect x="168" y="42" width="12" height="8" rx="3" fill="#fff5c0" opacity="0.95"/>
            <rect x="170" y="43" width="8"  height="6" rx="2" fill="#ffffff"/>

            <!-- Taillights -->
            <rect x="20" y="42" width="10" height="8" rx="3" fill="#ff4444" opacity="0.9"/>

            <!-- Front bumper -->
            <rect x="176" y="56" width="8" height="6" rx="3" fill="#2a3a5a"/>

            <!-- Rear bumper -->
            <rect x="16" y="56" width="8" height="6" rx="3" fill="#2a3a5a"/>

            <!-- Wheels -->
            <circle cx="55"  cy="66" r="14" fill="#1a1d2e" stroke="#4facfe" stroke-width="2"/>
            <circle cx="55"  cy="66" r="9"  fill="#2a3040" stroke="rgba(79,172,254,0.4)" stroke-width="1"/>
            <circle cx="55"  cy="66" r="4"  fill="#4facfe" opacity="0.8"/>
            <!-- Wheel spokes -->
            <line x1="55" y1="57" x2="55" y2="75" stroke="rgba(79,172,254,0.5)" stroke-width="1.5"/>
            <line x1="46" y1="66" x2="64" y2="66" stroke="rgba(79,172,254,0.5)" stroke-width="1.5"/>
            <line x1="48.6" y1="59.6" x2="61.4" y2="72.4" stroke="rgba(79,172,254,0.5)" stroke-width="1.5"/>
            <line x1="61.4" y1="59.6" x2="48.6" y2="72.4" stroke="rgba(79,172,254,0.5)" stroke-width="1.5"/>

            <circle cx="148" cy="66" r="14" fill="#1a1d2e" stroke="#4facfe" stroke-width="2"/>
            <circle cx="148" cy="66" r="9"  fill="#2a3040" stroke="rgba(79,172,254,0.4)" stroke-width="1"/>
            <circle cx="148" cy="66" r="4"  fill="#4facfe" opacity="0.8"/>
            <line x1="148" y1="57" x2="148" y2="75" stroke="rgba(79,172,254,0.5)" stroke-width="1.5"/>
            <line x1="139" y1="66" x2="157" y2="66" stroke="rgba(79,172,254,0.5)" stroke-width="1.5"/>
            <line x1="141.6" y1="59.6" x2="154.4" y2="72.4" stroke="rgba(79,172,254,0.5)" stroke-width="1.5"/>
            <line x1="154.4" y1="59.6" x2="141.6" y2="72.4" stroke="rgba(79,172,254,0.5)" stroke-width="1.5"/>

            <!-- Blue trim stripe -->
            <rect x="18" y="60" width="164" height="3" rx="1.5" fill="rgba(0,242,254,0.4)"/>

            <!-- Roof light glow -->
            <rect x="88" y="15" width="24" height="3" rx="1.5" fill="rgba(0,242,254,0.5)"/>
        </svg>
    </div>

    <!-- Speed lines -->
    <div class="speed-lines" id="speedLines"></div>

    <!-- Loading dots -->
    <div class="loading-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>
</div>


<script>
(function() {
    /* ── Generate stars ── */
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 2.5 + 0.5;
        s.style.cssText = `
            width:${size}px; height:${size}px;
            top:${Math.random() * 62}%;
            left:${Math.random() * 100}%;
            --dur:${(Math.random() * 3 + 1.5).toFixed(1)}s;
            --delay:${(Math.random() * 3).toFixed(1)}s;
        `;
        starsEl.appendChild(s);
    }

    /* ── Generate road dashes ── */
    const dashesEl = document.getElementById('roadDashes');
    for (let i = 0; i < 10; i++) {
        const d = document.createElement('div');
        d.className = 'dash';
        dashesEl.appendChild(d);
    }

    /* ── Generate speed lines ── */
    const linesEl = document.getElementById('speedLines');
    for (let i = 0; i < 14; i++) {
        const l = document.createElement('div');
        l.className = 'speed-line';
        const w = Math.random() * 80 + 40;
        l.style.cssText = `
            width:${w}px;
            top:${Math.random() * 100}%;
            left:${Math.random() * 60 + 20}%;
            --spd:${(Math.random() * 0.4 + 0.3).toFixed(2)}s;
            --del:${(Math.random() * 0.5).toFixed(2)}s;
            opacity:0.6;
        `;
        linesEl.appendChild(l);
    }

    /* ── Dismiss splash after 3.6 seconds ── */
    const SPLASH_DURATION = 3600;

    setTimeout(function() {
        const splash = document.getElementById('splash');
        splash.classList.add('exit');
        setTimeout(function() {
            splash.style.display = 'none';
            // If embedded in Flask, nothing needed — page already loaded underneath
        }, 650);
    }, SPLASH_DURATION);

    /* ── Also allow tap-to-skip ── */
    document.getElementById('splash').addEventListener('click', function() {
        clearTimeout(window._splashTimer);
        this.classList.add('exit');
        const self = this;
        setTimeout(function() { self.style.display = 'none'; }, 650);
    });
})();
</script>

</body>
</html>
