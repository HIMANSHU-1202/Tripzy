{% extends 'base.html' %}

{% block content %}

<div class="form-card">

    <h5 class="section-title">🚨 Emergency Contacts</h5>
    <p style="font-size:13px; color:#777; margin-bottom:20px;">
        These contacts receive your live GPS location via WhatsApp when you press SOS.
    </p>

    <form method="POST">

        <div class="contact-section">
            <div class="contact-label">👤 Contact 1</div>

            <div class="input-group-custom">
                <label>Full Name</label>
                <input type="text" name="name1" placeholder="e.g. Rahul Sharma"
                    value="{{ contacts.name1 if contacts else '' }}" required>
            </div>

            <div class="input-group-custom">
                <label>Phone Number</label>
                <input type="tel" name="phone1" placeholder="10-digit mobile number"
                    value="{{ contacts.phone1 if contacts else '' }}"
                    maxlength="10" required>
            </div>
        </div>

        <div class="contact-divider">— Contact 2 —</div>

        <div class="contact-section">
            <div class="contact-label">👤 Contact 2</div>

            <div class="input-group-custom">
                <label>Full Name</label>
                <input type="text" name="name2" placeholder="e.g. Priya Sharma"
                    value="{{ contacts.name2 if contacts else '' }}" required>
            </div>

            <div class="input-group-custom">
                <label>Phone Number</label>
                <input type="tel" name="phone2" placeholder="10-digit mobile number"
                    value="{{ contacts.phone2 if contacts else '' }}"
                    maxlength="10" required>
            </div>
        </div>

        <div class="info-box">
            🔒 These contacts are saved to your account and only used during SOS emergencies.
        </div>

        <button class="submit-btn mt-3">💾 Save Contacts</button>
    </form>

    <a href="/profile" class="back-link">← Back to Profile</a>
</div>

{% endblock %}
