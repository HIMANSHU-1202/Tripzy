{% extends 'base.html' %}

{% block content %}

<div class="form-card">

    <h5 class="section-title">Post a Ride</h5>

    <form method="POST">

        <div class="input-group-custom">
            <label>From</label>
            <input type="text" name="from" required>
        </div>

        <div class="input-group-custom">
            <label>To</label>
            <input type="text" name="to" required>
        </div>

        <div class="input-group-custom">
            <label>Date</label>
            <input type="date" name="date" required>
        </div>

        <div class="input-group-custom">
            <label>Time</label>
            <input type="time" name="time" required>
        </div>

        <div class="input-group-custom">
            <label>Seats</label>
            <input type="number" name="seats" required>
        </div>

        <div class="input-group-custom">
            <label>Price</label>
            <input type="number" name="price" required>
        </div>


        <!-- 🚗 Ride Preferences -->
        <h6 class="section-title mt-3">Ride Preferences</h6>

        <div class="chip-group">

            <label>🎵 Music</label>
            <div class="chips">
                <input type="radio" name="music" value="Allowed" id="music1">
                <label for="music1">Allowed</label>

                <input type="radio" name="music" value="Not Allowed" id="music2">
                <label for="music2">Not Allowed</label>
            </div>

            <label>🚬 Smoking / Alcohol</label>
            <div class="chips">
                <input type="radio" name="smoking" value="Allowed" id="smoke1">
                <label for="smoke1">Allowed</label>

                <input type="radio" name="smoking" value="Not Allowed" id="smoke2">
                <label for="smoke2">Not Allowed</label>
            </div>

            <label>🧳 Luggage Space</label>
            <div class="chips">
                <input type="radio" name="luggage" value="Available" id="lug1">
                <label for="lug1">Available</label>

                <input type="radio" name="luggage" value="Not Available" id="lug2">
                <label for="lug2">Not Available</label>
            </div>

            <label>🚻 Stops</label>
            <div class="chips">
                <input type="radio" name="stops" value="Yes" id="stop1">
                <label for="stop1">Yes</label>

                <input type="radio" name="stops" value="No" id="stop2">
                <label for="stop2">No</label>
            </div>

        </div>


        <div class="chip-group">

            <label>👤 Gender Preference</label>
            <div class="chips">
                <input type="radio" name="gender" value="Male" id="g1">
                <label for="g1">Male</label>

                <input type="radio" name="gender" value="Female" id="g2">
                <label for="g2">Female</label>

                <input type="radio" name="gender" value="Any" id="g3">
                <label for="g3">Any</label>
            </div>

            <label>❄️ AC</label>
            <div class="chips">
                <input type="radio" name="ac" value="Yes" id="ac1">
                <label for="ac1">Yes</label>

                <input type="radio" name="ac" value="No" id="ac2">
                <label for="ac2">No</label>
            </div>

            <label>🐶 Pets</label>
            <div class="chips">
                <input type="radio" name="pets" value="Allowed" id="pet1">
                <label for="pet1">Allowed</label>

                <input type="radio" name="pets" value="Not Allowed" id="pet2">
                <label for="pet2">Not Allowed</label>
            </div>

            <label>🔌 Charging</label>
            <div class="chips">
                <input type="radio" name="charging" value="Available" id="ch1">
                <label for="ch1">Available</label>

                <input type="radio" name="charging" value="Not Available" id="ch2">
                <label for="ch2">Not Available</label>
            </div>

        </div>

        <button class="submit-btn mt-3">Post Ride</button>

    </form>

</div>

{% endblock %}
